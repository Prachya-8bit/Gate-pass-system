<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gate Pass System — Wireframes</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<style>* { box-sizing: border-box; margin: 0; padding: 0; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const CF = { fontFamily: "'Caveat', cursive" };

// ── Shared style tokens ──────────────────────────────────────────────────────
const T = {
  screen:   { background: '#fff', ...CF, color: '#1a1a1a', overflow: 'hidden' },
  bar:      { background: '#1a1a1a', color: '#fff', padding: '10px 16px', fontSize: 16, fontWeight: 700, display: 'flex', alignItems: 'center', gap: 8, ...CF },
  barBlue:  { background: '#1d5fa3', color: '#fff', padding: '14px 18px', ...CF },
  body:     { padding: 16 },
  lbl:      { fontSize: 12, color: '#666', marginBottom: 3, display: 'block' },
  inp:      { border: '2px solid #bbb', borderRadius: 4, background: '#f9f9f9', height: 38, width: '100%', marginBottom: 12, padding: '0 10px', ...CF, fontSize: 14, color: '#aaa', display: 'flex', alignItems: 'center' },
  inpLg:    { border: '2px solid #bbb', borderRadius: 6, background: '#f9f9f9', height: 52, width: '100%', marginBottom: 0, padding: '0 14px', ...CF, fontSize: 15, color: '#aaa', display: 'flex', alignItems: 'center' },
  btn:      { background: '#1a1a1a', color: '#fff', borderRadius: 6, padding: '11px 0', width: '100%', textAlign: 'center', ...CF, fontSize: 16, fontWeight: 700, marginTop: 4, cursor: 'default' },
  btnSec:   { background: '#fff', color: '#444', border: '2px solid #aaa', borderRadius: 6, padding: '10px 0', width: '100%', textAlign: 'center', ...CF, fontSize: 15, marginTop: 4, cursor: 'default' },
  btnBlue:  { background: '#1d5fa3', color: '#fff', borderRadius: 6, padding: '13px 0', width: '100%', textAlign: 'center', ...CF, fontSize: 17, fontWeight: 700, cursor: 'default' },
  card:     { border: '2px solid #ddd', borderRadius: 6, padding: '10px 12px', marginBottom: 10, background: '#fafafa' },
  note:     { fontSize: 11, color: '#c05800', fontStyle: 'italic', borderLeft: '2px solid #c05800', paddingLeft: 6, marginBottom: 10, lineHeight: 1.5 },
  divider:  { borderTop: '2px dashed #ddd', margin: '14px 0' },
  tagGreen: { display: 'inline-block', background: '#e6f5e6', border: '1.5px solid #7cba7c', color: '#1a6a1a', borderRadius: 10, padding: '1px 9px', fontSize: 12, ...CF },
  tagRed:   { display: 'inline-block', background: '#fde8e8', border: '1.5px solid #e08888', color: '#7a2020', borderRadius: 10, padding: '1px 9px', fontSize: 12, ...CF },
};

// ── Atoms ────────────────────────────────────────────────────────────────────
const Fld = ({ lbl, hint, sel, date, lg }) => (
  <div>
    <span style={T.lbl}>{lbl}</span>
    <div style={{ ...(lg ? T.inpLg : T.inp), ...(sel || date ? { justifyContent: 'space-between' } : {}) }}>
      <span>{hint || (date ? 'วว/ดด/ปปปป' : '——')}</span>
      {sel && <span style={{ fontSize: 12, color: '#bbb' }}>▼</span>}
      {date && <span style={{ fontSize: 12, color: '#bbb' }}>□</span>}
    </div>
  </div>
);

const Steps = ({ cur, tot }) => (
  <div style={{ marginBottom: 18 }}>
    <div style={{ display: 'flex', gap: 5, marginBottom: 5 }}>
      {Array.from({ length: tot }, (_, i) => (
        <div key={i} style={{ flex: 1, height: 5, borderRadius: 3, background: i < cur ? '#1a1a1a' : '#ddd' }} />
      ))}
    </div>
    <span style={{ fontSize: 12, color: '#888' }}>ขั้นตอน {cur} / {tot}</span>
  </div>
);

const Note = ({ t }) => <div style={T.note}>{t}</div>;
const Row = ({ children, gap = 8 }) => <div style={{ display: 'flex', gap, alignItems: 'flex-start' }}>{children}</div>;
const Divider = () => <div style={T.divider} />;
const SecHead = ({ t, accent = '#1a1a1a' }) => (
  <div style={{ fontSize: 16, fontWeight: 700, borderLeft: `4px solid ${accent}`, paddingLeft: 8, marginBottom: 14, ...CF }}>{t}</div>
);

// ── OPTION A · Mobile Stepper ────────────────────────────────────────────────

function A1() {
  const people = [
    { name: 'นายสมชาย ใจดี',      id: '1100112345678' },
    { name: 'นางสาววิภา มีสุข',    id: '3200123456789' },
    { name: '',                    id: '' },
  ];
  return (
    <div style={T.screen}>
      <div style={T.bar}>
        <span style={{ fontSize: 20 }}>🏭</span>
        <span style={{ flex: 1 }}>ลงทะเบียนผู้รับเหมา</span>
      </div>
      <div style={T.body}>
        <Steps cur={1} tot={3} />
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
          <div style={{ fontSize: 17, fontWeight: 700, ...CF }}>รายชื่อผู้เข้าทำงาน</div>
          <div style={{ fontSize: 13, background: '#f0f0f0', border: '2px solid #ccc', borderRadius: 10, padding: '2px 10px', ...CF }}>3 / 10 คน</div>
        </div>

        {/* Column headers */}
        <div style={{ display: 'flex', gap: 6, marginBottom: 5, paddingLeft: 26, paddingRight: 28 }}>
          <div style={{ flex: 3, fontSize: 11, color: '#888' }}>ชื่อ-นามสกุล</div>
          <div style={{ flex: 2, fontSize: 11, color: '#888' }}>เลขบัตร (ตัวเลข 13 หลัก)</div>
        </div>

        {people.map((p, i) => (
          <div key={i} style={{ display: 'flex', gap: 6, marginBottom: 7, alignItems: 'center' }}>
            <div style={{ width: 20, fontSize: 11, color: '#999', flexShrink: 0, textAlign: 'center', ...CF }}>{i + 1}</div>
            <div style={{ flex: 3, border: '2px solid ' + (p.name ? '#888' : '#ddd'), borderRadius: 4, height: 36, background: p.name ? '#fff' : '#f9f9f9', padding: '0 8px', display: 'flex', alignItems: 'center', ...CF, fontSize: 13, color: p.name ? '#1a1a1a' : '#ccc' }}>
              {p.name || '— ชื่อ-นามสกุล —'}
            </div>
            <div style={{ flex: 2, border: '2px solid ' + (p.id ? '#888' : '#ddd'), borderRadius: 4, height: 36, background: p.id ? '#fff' : '#f9f9f9', padding: '0 8px', display: 'flex', alignItems: 'center', ...CF, fontSize: 12, color: p.id ? '#1a1a1a' : '#ccc', letterSpacing: p.id ? 1 : 0 }}>
              {p.id || '1234567890123'}
            </div>
            <div style={{ width: 22, height: 22, border: '2px solid #ddd', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13, color: '#bbb', flexShrink: 0, cursor: 'default' }}>×</div>
          </div>
        ))}

        <div style={{ border: '2px dashed #bbb', borderRadius: 6, padding: '8px 0', textAlign: 'center', ...CF, fontSize: 14, color: '#888', marginBottom: 10, cursor: 'default', marginTop: 2 }}>
          + เพิ่มคน
        </div>
        <Note t="✦ เพิ่มได้สูงสุด 10 คน · เลขบัตรกรอกเฉพาะตัวเลข 13 หลักเท่านั้น" />
        <Divider />
        <div style={T.btn}>ถัดไป →</div>
      </div>
    </div>
  );
}

function A2() {
  return (
    <div style={T.screen}>
      <div style={T.bar}>
        <span>←</span>
        <span style={{ flex: 1 }}>รายละเอียดการทำงาน</span>
      </div>
      <div style={T.body}>
        <Steps cur={2} tot={3} />
        <div style={{ fontSize: 17, fontWeight: 700, marginBottom: 14, ...CF }}>ข้อมูลงาน</div>
        <Fld lbl="บริษัทที่สังกัด" sel />
        <Fld lbl="งานที่ทำ / ตำแหน่ง" hint="เช่น ช่างไฟฟ้า, ช่างสี..." />
        <Fld lbl="พื้นที่ทำงาน (Zone)" hint="เช่น Zone A, อาคาร 2..." />
        <Row>
          <div style={{ flex: 1 }}><Fld lbl="วันที่เข้าทำงาน" date /></div>
          <div style={{ flex: 1 }}><Fld lbl="วันที่สิ้นสุด" date /></div>
        </Row>
        <Note t="✦ Man-day = (วันออก − วันเข้า + 1) คำนวณอัตโนมัติ" />
        <Divider />
        <Row>
          <div style={{ flex: 1 }}><div style={T.btnSec}>← ย้อนกลับ</div></div>
          <div style={{ flex: 2 }}><div style={T.btn}>ถัดไป →</div></div>
        </Row>
      </div>
    </div>
  );
}

function A3() {
  const people = [
    { name: 'นายสมชาย ใจดี',        id: '1100112345678' },
    { name: 'นางสาววิภา มีสุข',      id: '3200123456789' },
    { name: 'นายประวิทย์ เก่งมาก',   id: '4300198765432' },
  ];
  return (
    <div style={T.screen}>
      <div style={T.bar}><span>←</span><span>ยืนยันข้อมูล</span></div>
      <div style={T.body}>
        <Steps cur={3} tot={3} />
        <div style={{ fontSize: 17, fontWeight: 700, marginBottom: 12, ...CF }}>ตรวจสอบก่อนบันทึก</div>

        {/* Work details */}
        <div style={T.card}>
          <div style={{ fontSize: 11, color: '#888', marginBottom: 2 }}>บริษัท</div>
          <div style={{ fontWeight: 700, marginBottom: 8 }}>บจก. สยามก่อสร้าง</div>
          <Row>
            {[['วันเข้า', '11/06/69'], ['วันออก', '20/06/69'], ['Man-day', '10 วัน']].map(([l, v], i) => (
              <div key={l} style={{ flex: 1 }}>
                <div style={{ fontSize: 11, color: '#888' }}>{l}</div>
                <div style={{ fontWeight: 700, color: i === 2 ? '#1a6a1a' : '#1a1a1a', fontSize: i === 2 ? 16 : 14 }}>{v}</div>
              </div>
            ))}
          </Row>
        </div>

        {/* People list */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: '#444', ...CF }}>ผู้เข้าทำงาน</div>
          <div style={{ fontSize: 12, background: '#f0f0f0', border: '2px solid #ccc', borderRadius: 10, padding: '1px 9px', ...CF }}>3 คน</div>
        </div>
        {people.map((p, i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '7px 10px', background: i % 2 === 0 ? '#fafafa' : '#fff', border: '1.5px solid #eee', borderRadius: 4, marginBottom: 4 }}>
            <div style={{ width: 20, height: 20, background: '#1a1a1a', color: '#fff', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, flexShrink: 0, ...CF }}>{i + 1}</div>
            <div style={{ flex: 1, ...CF, fontSize: 13, fontWeight: 600 }}>{p.name}</div>
            <div style={{ fontSize: 11, color: '#aaa', letterSpacing: 0.5, ...CF }}>{p.id.slice(0, 3)}*******{p.id.slice(-3)}</div>
          </div>
        ))}

        <Divider />
        <div style={{ border: '2px solid #bbb', borderRadius: 6, padding: '10px 12px', marginBottom: 10, display: 'flex', alignItems: 'flex-start', gap: 10 }}>
          <div style={{ width: 20, height: 20, border: '2px solid #555', borderRadius: 3, flexShrink: 0, marginTop: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13 }}>✓</div>
          <span style={{ fontSize: 13, lineHeight: 1.4, ...CF }}>ข้าพเจ้าขอยืนยันว่าข้อมูลถูกต้อง และไม่มีประวัติอุบัติเหตุในช่วงเวลานี้</span>
        </div>
        <Note t="✦ หากมีอุบัติเหตุ ให้แจ้ง Safety Officer ก่อนบันทึก" />
        <div style={T.btn}>✓ บันทึกข้อมูล 3 คน</div>
      </div>
    </div>
  );
}

function A4() {
  const cos = [
    { n: 'บจก. สยามก่อสร้าง', d: 245, a: 0 },
    { n: 'บจก. ไทยอิเล็คทริค', d: 182, a: 0 },
    { n: 'หจก. พิษณุโลก', d: 98, a: 1 },
    { n: 'บจก. นวการ', d: 56, a: 0 },
  ];
  return (
    <div style={T.screen}>
      <div style={T.bar}>
        <span style={{ flex: 1 }}>สรุป Man-day (Admin)</span>
        <span style={{ fontSize: 12, background: '#444', borderRadius: 4, padding: '2px 8px' }}>มิ.ย. 2569</span>
      </div>
      <div style={T.body}>
        <Row gap={8}>
          {[['581', 'Man-days รวม'], ['4', 'บริษัท'], ['1', 'อุบัติเหตุ']].map(([n, l]) => (
            <div key={l} style={{ flex: 1, border: '2px solid #ddd', borderRadius: 6, padding: '8px 0', textAlign: 'center', background: '#fafafa' }}>
              <div style={{ fontSize: 22, fontWeight: 700, ...CF }}>{n}</div>
              <div style={{ fontSize: 11, color: '#777', ...CF }}>{l}</div>
            </div>
          ))}
        </Row>
        <Divider />
        <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 10, ...CF }}>รายละเอียดตามบริษัท</div>
        {cos.map(c => (
          <div key={c.n} style={{ ...T.card, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div>
              <div style={{ fontWeight: 600, fontSize: 14 }}>{c.n}</div>
              <div style={{ fontSize: 12, color: '#888' }}>สะสม <strong>{c.d}</strong> Man-days</div>
            </div>
            <span style={c.a === 0 ? T.tagGreen : T.tagRed}>{c.a === 0 ? '0 อุบัติเหตุ' : `⚠ ${c.a} อุบัติเหตุ`}</span>
          </div>
        ))}
        <Note t="✦ แตะที่บริษัทเพื่อดูประวัติรายคน" />
      </div>
    </div>
  );
}

// ── OPTION B · Single-Page Form + Admin Table ────────────────────────────────

function B1() {
  return (
    <div style={T.screen}>
      <div style={{ ...T.barBlue }}>
        <div style={{ fontSize: 20, fontWeight: 700 }}>🏭 Gate Pass Registration</div>
        <div style={{ fontSize: 13, opacity: 0.8, marginTop: 2 }}>โรงงานนิคมอุตสาหกรรม XYZ — กรอกข้อมูลทุกช่อง</div>
      </div>

      {/* Live stats strip */}
      <div style={{ display: 'flex', background: '#e8f0fa', borderBottom: '2px solid #c5d9f5', padding: '10px 16px' }}>
        {[['1,234', 'Man-days ปีนี้', '#1d5fa3'], ['8', 'บริษัท', '#444'], ['47', 'คนปัจจุบัน', '#1a6a1a']].map(([n, l, c]) => (
          <div key={l} style={{ flex: 1, textAlign: 'center' }}>
            <div style={{ fontSize: 20, fontWeight: 700, color: c, ...CF }}>{n}</div>
            <div style={{ fontSize: 11, color: '#556', ...CF }}>{l}</div>
          </div>
        ))}
      </div>

      <div style={T.body}>
        <SecHead t="ข้อมูลส่วนตัว" accent="#1d5fa3" />
        <Fld lbl="ชื่อ - นามสกุล" hint="นาย / นาง / นางสาว..." />
        <Fld lbl="เลขบัตรประชาชน" hint="x-xxxx-xxxxx-xx-x" />
        <Fld lbl="เบอร์โทรศัพท์" hint="08x-xxx-xxxx" />
        <Divider />
        <SecHead t="รายละเอียดงาน" accent="#1d5fa3" />
        <Fld lbl="บริษัทที่สังกัด" sel />
        <Fld lbl="งานที่ทำ / ตำแหน่ง" hint="เช่น ช่างไฟฟ้า, แรงงานทั่วไป..." />
        <Row>
          <div style={{ flex: 1 }}><Fld lbl="วันที่เข้าทำงาน" date /></div>
          <div style={{ flex: 1 }}><Fld lbl="วันที่สิ้นสุด" date /></div>
        </Row>
        <Note t="✦ Man-day คำนวณอัตโนมัติจากช่วงวันที่ที่เลือก" />
        <Divider />

        {/* Man-day preview box */}
        <div style={{ ...T.card, background: '#f0f6ff', border: '2px solid #c5d9f5', marginBottom: 14 }}>
          <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 4, ...CF }}>ประมาณการ Man-day</div>
          <div style={{ fontSize: 28, fontWeight: 700, color: '#1d5fa3', ...CF }}>— วัน</div>
          <div style={{ fontSize: 12, color: '#889', ...CF }}>บจก. [เลือกบริษัท] · สะสมปีนี้: — Man-days</div>
        </div>

        <div style={T.btnBlue}>✓ บันทึกและรับ Gate Pass</div>
      </div>
    </div>
  );
}

function B2() {
  const rows = [
    { n: 'บจก. สยามก่อสร้าง',     w: 23, d: 712, cur: 8,  a: 0 },
    { n: 'บจก. ไทยอิเล็คทริค',    w: 18, d: 498, cur: 5,  a: 0 },

  const cols = ['บริษัทที่สังกัด', 'ช่างทั้งหมด', 'Man-days สะสม', 'คนปัจจุบัน', 'สถานะ'];
  return (
    <div style={T.screen}>
      <div style={T.bar}>
        <span style={{ flex: 1 }}>Admin — รายงาน Man-day รายบริษัท</span>
        <div style={{ display: 'flex', gap: 6 }}>
          <span style={{ background: '#444', borderRadius: 4, padding: '2px 9px', fontSize: 12 }}>ปี 2569</span>
          <span style={{ background: '#1d5fa3', borderRadius: 4, padding: '2px 9px', fontSize: 12 }}>⬇ Export</span>
        </div>
      </div>

      {/* KPI strip */}
      <div style={{ display: 'flex', background: '#f5f7fa', borderBottom: '2px solid #ddd', padding: '10px 20px', gap: 28 }}>

      </div>
    </div>

}
